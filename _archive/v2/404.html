<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 — Page Not Found | Bitroot</title>
  <meta name="robots" content="noindex">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.png" rel="apple-touch-icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0e10;
      --surface: #161d24;
      --border:  #1e2730;
      --yellow:  #f5c842;
      --white:   #f0f0f0;
      --muted:   #8b949e;
      --blue:    #1f76f9;
      --green:   #3fb950;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .e-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .e-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -.3px;
    }
    .e-logo span { color: var(--blue); }
    .e-nav-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }
    .e-nav-back:hover { color: var(--white); }

    /* ── Main ── */
    .e-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 65px);
      padding: 60px 24px;
      text-align: center;
    }

    .e-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--yellow);
      background: rgba(245, 200, 66, .1);
      border: 1px solid rgba(245, 200, 66, .2);
      padding: 5px 12px;
      border-radius: 50px;
      margin-bottom: 28px;
    }

    .e-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(88px, 16vw, 168px);
      font-weight: 700;
      color: var(--yellow);
      line-height: 1;
      letter-spacing: -6px;
      margin-bottom: 20px;
    }

    .e-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -.3px;
    }

    .e-desc {
      font-size: 15px;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .e-url-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 40px;
      max-width: 540px;
      width: 100%;
    }
    .e-url-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      flex-shrink: 0;
    }
    .e-url-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: rgba(240,240,240,.5);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-align: left;
    }

    /* ── Buttons ── */
    .e-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .e-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .15s;
      border: none;
    }
    .e-btn:hover { transform: translateY(-1px); opacity: .9; }
    .e-btn:active { transform: translateY(0); }
    .e-btn--primary { background: var(--blue); color: #fff; }
    .e-btn--outline {
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
    }
    .e-btn--outline:hover { border-color: rgba(255,255,255,.3); }

    /* ── Toast ── */
    .e-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #162216;
      border: 1px solid rgba(63,185,80,.3);
      color: var(--green);
      padding: 11px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      transition: transform .3s ease;
      z-index: 9999;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .e-toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .e-nav { padding: 16px 20px; }
      .e-url-wrap { max-width: 100%; }
      .e-actions { flex-direction: column; align-items: stretch; }
      .e-btn { justify-content: center; }
    }
  </style>
</head>
<body>

  <nav class="e-nav">
    <a href="/" class="e-logo">bit<span>root</span></a>
    <a href="/" class="e-nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to site
    </a>
  </nav>

  <main class="e-main">
    <div class="e-badge">Error 404</div>
    <div class="e-code">404</div>
    <h1 class="e-title">Page not found</h1>
    <p class="e-desc">This page doesn't exist or has been moved. If you followed a link and landed here, it might be broken — let us know.</p>

    <div class="e-url-wrap">
      <span class="e-url-label">URL</span>
      <span class="e-url-text" id="errUrl"></span>
    </div>

    <div class="e-actions">
      <a href="/" class="e-btn e-btn--primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Return Home
      </a>
      <button class="e-btn e-btn--outline" id="reportBtn" onclick="reportIssue()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Report an Issue
      </button>
    </div>
  </main>

  <div class="e-toast" id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    Issue reported — we'll look into it
  </div>

  <script>
    // Show broken URL
    var urlEl = document.getElementById('errUrl');
    if (urlEl) urlEl.textContent = window.location.href;

    function reportIssue() {
      var btn = document.getElementById('reportBtn');
      var url = window.location.href;
      var ref = document.referrer || 'direct';

      // Disable button to prevent double-fire
      btn.disabled = true;
      btn.style.opacity = '0.5';

      // PostHog event — real-time notification in PostHog dashboard
      if (window.posthog) {
        posthog.capture('404_issue_reported', {
          broken_url: url,
          referrer: ref,
        });
      }

      // Show toast
      var toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 3500);

      // Open mailto with pre-filled context
      setTimeout(function () {
        var subject = encodeURIComponent('404 Issue: ' + url);
        var body = encodeURIComponent(
          'Hi Bitroot team,\n\nI found a broken page:\n' + url +
          '\n\nReferrer: ' + ref +
          '\n\n(Sent automatically from the 404 page)'
        );
        window.location.href = 'mailto:contact.bitroot@gmail.com?subject=' + subject + '&body=' + body;
      }, 700);
    }
  </script>

  <script src="js/help-widget.js"></script>
</body>
</html>
