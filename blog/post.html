<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting… | Bitroot Newslogger</title>
    <meta name="robots" content="noindex">
    <!-- Legacy URL shim: posts moved from /blog/post.html?slug=<slug> to
         static pages at /blog/<slug>/. Preserves extra params (embed/reader
         mode for the mobile app webview) and the hash. -->
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var slug = params.get('slug');
            if (!slug || /[\/\\]|\.\./.test(slug)) {
                window.location.replace('/blog/');
                return;
            }
            params.delete('slug');
            var qs = params.toString();
            window.location.replace(
                '/blog/' + encodeURIComponent(slug) + '/' +
                (qs ? '?' + qs : '') + window.location.hash
            );
        })();
    </script>
</head>
<body>
    <p>This post has moved. <a href="/blog/">Go to the newslogger</a> if you are not redirected.</p>
</body>
</html>
